name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DOCKER_BUILDKIT: 1
      SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519,rsa,ecdsa 188.245.221.31 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Build image on server
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          rsync -az --delete --exclude='.git' -e ssh . root@188.245.221.31:/tmp/hive-build
          ssh root@188.245.221.31 "cd /tmp/hive-build && docker build -t localhost:5555/hive:$COMMIT_SHA -t localhost:5555/hive:latest . && docker push localhost:5555/hive:$COMMIT_SHA && docker push localhost:5555/hive:latest && rm -rf /tmp/hive-build"

      - name: Deploy with Kamal
        run: kamal deploy --skip-push
