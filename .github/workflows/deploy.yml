name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DOCKER_BUILDKIT: 1
      SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519,rsa,ecdsa 188.245.221.31 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Ensure registry is running on server
        run: ssh root@188.245.221.31 "docker start kamal-registry 2>/dev/null || docker run -d --name kamal-registry --restart always -p 5555:5000 registry:2"

      - name: Configure buildkit for insecure registry
        run: |
          ssh root@188.245.221.31 '
            for CONTAINER in $(docker ps -a --filter "name=buildkit" --format "{{.Names}}"); do
              printf "[registry.\"188.245.221.31:5555\"]\n  http = true\n  insecure = true\n" | docker exec -i $CONTAINER sh -c "cat > /etc/buildkit/buildkitd.toml"
              docker restart $CONTAINER
            done
            sleep 5
          '

      - name: Deploy with Kamal
        run: kamal deploy
